name: CI/CD

on:
  - push
  - pull_request

jobs:
  check-commit-message:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
      - id: check
        shell: bash
        run: |
          message="$(git log -1 --pretty=%B)"

          echo "Commit message:"
          echo "$message"

          if [[ "$message" == "[wip]"* || "$message" == "[broken]"* ]]; then
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: check-commit-message
    if: needs.check-commit-message.outputs.should_run == 'true'
    env:
      BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET }}
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - uses: pnpm/action-setup@v6
        with:
          run_install: true

      - uses: actions/setup-node@v6
        with:
          node-version-file: ".nvmrc"

      - name: Instrumentation
        run: |
          pwd
          ls -l
          cat tsconfig.json
          export
          node --version
          pnpm --version
          pnpm exec tsc --version

      - name: Typecheck
        run: pnpm run types:check

      - name: Linting
        run: pnpm run lint:check

      - name: Formatting
        run: pnpm run format:check

      - name: Build
        run: |
          echo "BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET}" > .env
          pnpm run build

      - name: Instrument folder
        run: |
          echo "ls -la dist/"
          ls -la dist/
          echo "cat dist/client/.assetsignore"
          cat dist/client/.assetsignore

      - name: Publish to Cloudflare
        if: github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
