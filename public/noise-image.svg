<svg
  id="noise-image"
  viewBox="0 0 100 100"
  width="100"
  height="100"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>
  <filter id="noiseFilter">
    <feTurbulence
      type="fractalNoise"
      baseFrequency="0.55"
      numOctaves="3"
      stitchTiles="stitch"
      result="noise"></feTurbulence>

    <feColorMatrix in="noise" type="saturate" values="0" result="desaturated"
    ></feColorMatrix>

    <feComponentTransfer in="desaturated">
      <feFuncR type="discrete" tableValues="0 1"></feFuncR>
      <feFuncG type="discrete" tableValues="0 1"></feFuncG>
      <feFuncB type="discrete" tableValues="0 1"></feFuncB>
    </feComponentTransfer>
  </filter>

  <rect width="100%" height="100%" filter="url(#noiseFilter)"></rect>
</svg>
